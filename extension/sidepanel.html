<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WatchParty</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --wp-accent: #6366f1;
      --wp-accent-hover: #5558e6;
      --wp-accent-light: #818cf8;
      --wp-accent-rgb: 99, 102, 241;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1e; color: #ccc; font-size: 13px;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* Header */
    .header {
      display: flex; align-items: center; gap: 8px; padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      background: rgba(var(--wp-accent-rgb), 0.08);
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #fff; }
    .room-code {
      font-family: 'Consolas', monospace; font-size: 11px; color: var(--wp-accent);
      background: rgba(var(--wp-accent-rgb), 0.15); padding: 2px 6px; border-radius: 4px;
      cursor: pointer;
    }
    .room-code:hover { background: rgba(var(--wp-accent-rgb), 0.25); }

    /* Status */
    .status { padding: 10px 16px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .status-line { display: block; margin-bottom: 2px; }
    .muted { color: #666; }

    /* Action buttons */
    .action-row { display: flex; gap: 6px; margin-top: 6px; }
    .action-btn {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 4px 10px; font-size: 11px; color: #ccc;
      cursor: pointer; transition: all .12s;
    }
    .action-btn:hover { background: rgba(var(--wp-accent-rgb), 0.15); border-color: rgba(var(--wp-accent-rgb), 0.3); color: var(--wp-accent-light); }
    .leave-btn { color: #ef4444; border-color: rgba(239,68,68,0.3); }
    .leave-btn:hover { background: rgba(239,68,68,0.15); color: #f87171; }

    /* Sync indicator */
    .sync-indicator { padding: 4px 16px; font-size: 11px; }
    .sync-ok { color: #22c55e; }
    .sync-drift { color: #f59e0b; }

    /* Users */
    .users {
      padding: 6px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);
      max-height: 120px; overflow-y: auto;
    }
    .user { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 2px 0; }
    .user-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .user-away { opacity: 0.4; }
    .user-status { font-size: 9px; color: #666; margin-left: 2px; }
    .user-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .user-playhead { color: #98a2b3; font-size: 11px; font-variant-numeric: tabular-nums; flex-shrink: 0; }

    /* Chat */
    .chat-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 8px 16px; font-size: 12px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .typing-indicator {
      padding: 0 16px 8px; color: #98a2b3; font-size: 11px; font-style: italic;
    }
    .chat-msg { margin-bottom: 4px; line-height: 1.5; word-break: break-word; }
    .chat-name { font-weight: 600; }
    .chat-text { color: #ccc; }
    .bookmark-msg {
      background: rgba(var(--wp-accent-rgb), 0.06); border-left: 2px solid var(--wp-accent);
      padding: 2px 8px 2px 12px; border-radius: 4px; margin-bottom: 4px; font-size: 11px;
    }
    .bookmark-time {
      background: rgba(var(--wp-accent-rgb), 0.2); border: none; border-radius: 4px;
      padding: 1px 6px; color: var(--wp-accent-light); font-size: 11px; font-family: monospace;
      cursor: pointer;
    }
    .bookmark-time:hover { background: rgba(var(--wp-accent-rgb), 0.35); }
    .chat-input-row {
      display: flex; padding: 8px 12px; gap: 6px;
      border-top: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.15);
    }
    .chat-input {
      flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 12px; outline: none;
    }
    .chat-input:focus { border-color: var(--wp-accent); }
    .chat-input::placeholder { color: #555; }
    .chat-send {
      background: var(--wp-accent); color: #fff; border: none; border-radius: 6px;
      padding: 6px 12px; font-size: 12px; cursor: pointer;
    }
    .chat-send:hover { background: var(--wp-accent-hover); }

    /* Empty state */
    .empty-state { padding: 32px 20px; text-align: center; color: #888; line-height: 1.7; }

    /* Toast */
    .toast {
      position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
      background: rgba(15,15,30,0.95); color: #fff; font-size: 12px;
      padding: 6px 16px; border-radius: 6px; border: 1px solid rgba(var(--wp-accent-rgb), 0.3);
      opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100;
    }
    .toast.visible { opacity: 1; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <h1>WatchParty</h1>
    <span id="room-code" class="room-code hidden"></span>
  </div>

  <div id="status" class="status">
    <div class="empty-state">Not in a room.<br>Use the extension popup to create or join one.</div>
  </div>

  <div id="sync-indicator" class="sync-indicator hidden"></div>

  <div id="users" class="users hidden"></div>

  <div id="chat-container" class="chat-container hidden">
    <div id="chat-messages" class="chat-messages"></div>
    <div id="typing-indicator" class="typing-indicator hidden"></div>
    <div class="chat-input-row">
      <input id="chat-input" class="chat-input" type="text" placeholder="Type a message..." maxlength="300" autocomplete="off">
      <button id="chat-send" class="chat-send">Send</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="constants.js"></script>
  <script src="utils.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
