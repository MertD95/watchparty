name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '24'
  SERVER_REPO: MertD95/watchparty-server
  SERVER_CHECKOUT_PATH: watchparty-server
  PACKAGE_NAME: watchparty-extension.zip

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install extension repo dependencies
        run: npm ci

      - name: Run maintained fast suite
        run: npm run test:fast

      - name: Checkout backend repo
        env:
          SERVER_TOKEN: ${{ secrets.SERVER_REPO_TOKEN }}
          SERVER_REPO_REF: ${{ vars.SERVER_REPO_REF }}
        run: |
          set -euo pipefail
          REMOTE="https://github.com/${SERVER_REPO}.git"
          if [ -n "${SERVER_TOKEN:-}" ]; then
            REMOTE="https://x-access-token:${SERVER_TOKEN}@github.com/${SERVER_REPO}.git"
          fi
          if [ -n "${SERVER_REPO_REF:-}" ]; then
            git clone --depth 1 --branch "${SERVER_REPO_REF}" "${REMOTE}" "${SERVER_CHECKOUT_PATH}"
          else
            git clone --depth 1 "${REMOTE}" "${SERVER_CHECKOUT_PATH}"
          fi

      - name: Install backend repo dependencies
        run: npm ci
        working-directory: ${{ env.SERVER_CHECKOUT_PATH }}

      - name: Verify generated protocol is current
        run: |
          node tools/gen-protocol.js --check
          node tools/gen-room-domain.js --check
          node tools/gen-direct-play-domain.js --check
        working-directory: ${{ env.SERVER_CHECKOUT_PATH }}
        env:
          WATCHPARTY_EXTENSION_ROOT: ${{ github.workspace }}/extension

      - name: Install Playwright browser runtime
        run: npx playwright install --with-deps chromium

      - name: Run maintained integration suite
        run: npm run test:integration
        env:
          WATCHPARTY_SERVER_ROOT: ${{ github.workspace }}/${{ env.SERVER_CHECKOUT_PATH }}

      - name: Run maintained browser suite
        run: npm run test:browser
        env:
          WATCHPARTY_SERVER_ROOT: ${{ github.workspace }}/${{ env.SERVER_CHECKOUT_PATH }}

  package:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: release-artifacts
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Package extension
        run: |
          cd extension
          zip -r "../${PACKAGE_NAME}" . \
            -x "test/*" \
            -x "*.mjs"
          cd ..
          sha256sum "${PACKAGE_NAME}" > "${PACKAGE_NAME}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: extension-package
          path: |
            ${{ env.PACKAGE_NAME }}
            ${{ env.PACKAGE_NAME }}.sha256
          if-no-files-found: error
          retention-days: 7

      - name: Upload release assets
        uses: softprops/action-gh-release@6da8fa9354ddfdc4aeace5fc48d7f679b5214090
        with:
          files: |
            ${{ env.PACKAGE_NAME }}
            ${{ env.PACKAGE_NAME }}.sha256

  chrome-publish:
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: chrome-web-store
    if: ${{ vars.CHROME_PUBLISH_ENABLED == 'true' }}
    steps:
      - name: Download packaged extension
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: extension-package

      - name: Publish to Chrome Web Store
        uses: mnao305/chrome-extension-upload@4008e29e13c144d0f6725462cbd49b7c291b4928
        with:
          file-path: ${{ env.PACKAGE_NAME }}
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
